<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
  />

  <title>AR Hunt</title>

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <main id="app">

    <!-- Kamera -->
    <video
      id="cameraVideo"
      autoplay
      playsinline
      muted
    ></video>

    <!-- Layer object AR -->
    <div id="worldLayer"></div>

    <!-- UI -->
    <div id="uiLayer">

      <div id="topBar">
        <div class="hudBox">
          Score: <span id="scoreText">0</span>/5
        </div>

        <div class="hudBox">
          Time: <span id="timeText">0.0</span>s
        </div>
      </div>

      <div id="instructionBox">
        Tekan Start untuk mulai AR Hunt.
      </div>

      <!-- Crosshair gaya AR corner-bracket + dwell ring -->
      <div id="crosshair">
        <div class="ch-corner tl"></div>
        <div class="ch-corner tr"></div>
        <div class="ch-corner bl"></div>
        <div class="ch-corner br"></div>
        <svg class="ch-ring" viewBox="0 0 100 100">
          <circle id="dwellRing" cx="50" cy="50" r="42"/>
        </svg>
        <div class="ch-dot"></div>
      </div>

      <div id="bottomControls">
        <button id="startButton" type="button">START</button>
        <button id="captureButton" type="button" class="hidden">TANGKAP</button>
      </div>

    </div>

    <!-- Panel hasil -->
    <div id="resultPanel" class="hidden">
      <div class="resultCard">
        <h1>Game Selesai</h1>

        <p>
          Item tertangkap:
          <strong><span id="finalScoreText">0</span>/5</strong>
        </p>

        <p>
          Waktu:
          <strong><span id="finalTimeText">0.0</span> detik</strong>
        </p>

        <button id="restartButton" type="button">MAIN LAGI</button>
      </div>
    </div>

  </main>

  <script src="js/main.js"></script>
</body>
</html>
